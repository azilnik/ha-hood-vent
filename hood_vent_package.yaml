# Hood Vent Smart Control Package
# ================================
# https://github.com/azilnik/ha-smart-hood-vent
#
# SETUP:
# 1. Add 3 entity IDs to your secrets.yaml (see secrets_example.yaml)
# 2. Copy this file to /config/packages/hood_vent_package.yaml
# 3. Add to configuration.yaml:
#      homeassistant:
#        packages:
#          hood_vent: !include packages/hood_vent_package.yaml
# 4. Restart Home Assistant
#
# That's it. This file reads your device IDs from secrets.yaml automatically.

# ============================================================================
# INPUT NUMBERS - Adjustable thresholds (tune via UI)
# ============================================================================
input_number:
  hood_temp_rise_threshold:
    name: "Hood: Temp Rise Threshold (°/min)"
    min: 0.1
    max: 3.0
    step: 0.1
    initial: 0.5
    unit_of_measurement: "°/min"
    icon: mdi:thermometer-chevron-up

  hood_temp_fall_threshold:
    name: "Hood: Temp Fall Threshold (°/min)"
    min: -0.5
    max: 0.5
    step: 0.05
    initial: 0.1
    unit_of_measurement: "°/min"
    icon: mdi:thermometer-chevron-down

  hood_humidity_rise_threshold:
    name: "Hood: Humidity Rise Threshold (%/min)"
    min: 0.1
    max: 5.0
    step: 0.1
    initial: 1.0
    unit_of_measurement: "%/min"
    icon: mdi:water-percent

  hood_off_delay_minutes:
    name: "Hood: Off Delay (minutes)"
    min: 1
    max: 10
    step: 1
    initial: 2
    unit_of_measurement: "min"
    icon: mdi:timer-outline

  hood_on_confirm_seconds:
    name: "Hood: On Confirmation (seconds)"
    min: 15
    max: 180
    step: 5
    initial: 60
    unit_of_measurement: "s"
    icon: mdi:timer-check-outline

  # Warm-ambient (summer) desensitization. When the kitchen's smoothed ambient
  # temperature climbs above the baseline below, the ON thresholds are scaled up
  # so hot/humid summer air, AC cycling, an open window, or someone just
  # breathing near the sensor no longer looks like cooking. When the kitchen is
  # cool (winter), the boost is zero and full sensitivity is preserved.
  hood_warm_ambient_temp:
    name: "Hood: Warm Ambient Baseline (°C)"
    min: 15
    max: 30
    step: 0.5
    initial: 24
    unit_of_measurement: "°C"
    icon: mdi:sun-thermometer

  hood_warm_ambient_boost:
    name: "Hood: Warm Ambient Boost (per °C)"
    min: 0
    max: 0.3
    step: 0.01
    # Off by default (opt-in). The warm-ambient boost only makes sense when the
    # temperature sensor reads true ROOM ambient. On a stovetop-mounted sensor
    # (the common setup) the 30-min mean is polluted by cooking heat, so a
    # positive boost desensitizes detection mid-cook — backwards. Raise this
    # only if your temp source is a wall/room sensor. See docs/tuning.md.
    initial: 0
    unit_of_measurement: "×/°C"
    icon: mdi:tune-vertical

# ============================================================================
# INPUT BOOLEANS - Manual override and enable/disable
# ============================================================================
input_boolean:
  hood_automation_enabled:
    name: "Hood: Automation Enabled"
    icon: mdi:robot

  hood_manual_override:
    name: "Hood: Manual Override Active"
    icon: mdi:hand-back-left

# ============================================================================
# TEMPLATE SENSORS - Derivative calculations
# ============================================================================
template:
  - sensor:
      - name: "Kitchen Temp Rate of Change"
        unique_id: kitchen_temp_rate_of_change
        unit_of_measurement: "°/min"
        state_class: measurement
        icon: mdi:chart-line
        state: >
          {{ states('sensor.kitchen_temp_derivative') | float(0) | round(2) }}
        availability: >
          {{ states('sensor.kitchen_temp_derivative') not in ['unknown', 'unavailable'] }}

      - name: "Kitchen Humidity Rate of Change"
        unique_id: kitchen_humidity_rate_of_change
        unit_of_measurement: "%/min"
        state_class: measurement
        icon: mdi:chart-line
        state: >
          {{ states('sensor.kitchen_humidity_derivative') | float(0) | round(2) }}
        availability: >
          {{ states('sensor.kitchen_humidity_derivative') not in ['unknown', 'unavailable'] }}

  - binary_sensor:
      - name: "Stove Activity Detected"
        unique_id: stove_activity_detected
        device_class: heat
        icon: mdi:stove
        state: >
          {% set temp_rate = states('sensor.kitchen_temp_rate_of_change') | float(0) %}
          {% set humidity_rate = states('sensor.kitchen_humidity_rate_of_change') | float(0) %}
          {% set temp_threshold = states('input_number.hood_temp_rise_threshold') | float(0.5) %}
          {% set humidity_threshold = states('input_number.hood_humidity_rise_threshold') | float(1.0) %}
          {# Warm-ambient boost: scale thresholds up as the kitchen's smoothed  #}
          {# ambient temperature rises above the baseline. Zero in winter.       #}
          {% set ambient = states('sensor.kitchen_temp_average') | float(20) %}
          {% set warm_ref = states('input_number.hood_warm_ambient_temp') | float(24) %}
          {% set boost = states('input_number.hood_warm_ambient_boost') | float(0.06) %}
          {% set warmth = [ambient - warm_ref, 0] | max %}
          {% set factor = 1 + warmth * boost %}
          {% set temp_eff = temp_threshold * factor %}
          {% set humidity_eff = humidity_threshold * factor %}
          {{ temp_rate > temp_eff or humidity_rate > humidity_eff }}
        delay_off:
          minutes: 1

# ============================================================================
# DERIVATIVE SENSORS - Core rate-of-change calculations
# ============================================================================
sensor:
  - platform: derivative
    source: !secret hood_temperature_sensor
    name: "Kitchen Temp Derivative"
    unit_time: min
    # 3-minute window smooths out transient spikes (a breath, an open window,
    # AC cycling) while still catching real cooking within ~1 minute.
    time_window: "00:03:00"
    round: 2

  - platform: derivative
    source: !secret hood_humidity_sensor
    name: "Kitchen Humidity Derivative"
    unit_time: min
    time_window: "00:03:00"
    round: 2

  - platform: statistics
    name: "Kitchen Temp Stats (10min)"
    entity_id: !secret hood_temperature_sensor
    state_characteristic: change
    max_age:
      minutes: 10

  # Smoothed ambient temperature — the baseline the room is sitting at, ignoring
  # short cooking spikes. Feeds the warm-ambient (summer) threshold boost above.
  - platform: statistics
    name: "Kitchen Temp Average"
    entity_id: !secret hood_temperature_sensor
    state_characteristic: mean
    max_age:
      minutes: 30

# ============================================================================
# AUTOMATIONS
# ============================================================================
automation:
  - id: hood_vent_auto_on
    alias: "Hood Vent: Auto On"
    description: "Turn on hood when temperature or humidity rising quickly"
    trigger:
      - platform: state
        entity_id: binary_sensor.stove_activity_detected
        to: "on"
        for:
          seconds: "{{ states('input_number.hood_on_confirm_seconds') | int(60) }}"
    condition:
      - condition: state
        entity_id: input_boolean.hood_automation_enabled
        state: "on"
      - condition: state
        entity_id: input_boolean.hood_manual_override
        state: "off"
    action:
      - service: switch.turn_on
        target:
          entity_id: !secret hood_switch
      - service: logbook.log
        data:
          name: "Hood Vent"
          message: "Auto ON - Stove activity detected"
          entity_id: !secret hood_switch
    mode: single

  - id: hood_vent_auto_off
    alias: "Hood Vent: Auto Off"
    description: "Turn off hood when temperature rate falls below threshold"
    trigger:
      - platform: template
        value_template: >
          {% set temp_rate = states('sensor.kitchen_temp_rate_of_change') | float(0) %}
          {% set threshold = states('input_number.hood_temp_fall_threshold') | float(0.1) %}
          {{ temp_rate < threshold }}
        for:
          minutes: "{{ states('input_number.hood_off_delay_minutes') | int(2) }}"
    condition:
      - condition: state
        entity_id: !secret hood_switch
        state: "on"
      - condition: state
        entity_id: input_boolean.hood_automation_enabled
        state: "on"
      - condition: state
        entity_id: input_boolean.hood_manual_override
        state: "off"
      - condition: state
        entity_id: binary_sensor.stove_activity_detected
        state: "off"
    action:
      - service: switch.turn_off
        target:
          entity_id: !secret hood_switch
      - service: logbook.log
        data:
          name: "Hood Vent"
          message: "Auto OFF - Cooling detected"
          entity_id: !secret hood_switch
    mode: single

  - id: hood_vent_manual_override_on
    alias: "Hood Vent: Detect Manual Override"
    description: "Detect manual control and pause automation temporarily"
    trigger:
      - platform: state
        entity_id: !secret hood_switch
    condition:
      - condition: template
        # Guard trigger.context: at startup validation (and reloads) the
        # condition is rendered once with no trigger, so an unguarded
        # trigger.context.user_id throws UndefinedError. Short-circuit first.
        value_template: >-
          {{ trigger is defined and trigger.context is defined
             and trigger.context.user_id is not none }}
    action:
      - service: input_boolean.turn_on
        target:
          entity_id: input_boolean.hood_manual_override
      - delay:
          minutes: 30
      - service: input_boolean.turn_off
        target:
          entity_id: input_boolean.hood_manual_override
    mode: restart

  - id: hood_vent_safety_off
    alias: "Hood Vent: Safety Auto Off (Max Runtime)"
    description: "Turn off hood after 2 hours regardless of conditions"
    trigger:
      - platform: state
        entity_id: !secret hood_switch
        to: "on"
        for:
          hours: 2
    action:
      - service: switch.turn_off
        target:
          entity_id: !secret hood_switch
      - service: persistent_notification.create
        data:
          title: "Hood Vent: Safety Shutoff"
          message: "Hood vent turned off after the 2-hour safety limit. Still cooking? Turn it back on manually."
          notification_id: hood_safety_off
    mode: single
